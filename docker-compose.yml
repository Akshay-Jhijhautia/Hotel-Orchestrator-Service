version: "3.8"

services:
  # ---- PostgreSQL for Temporal persistence ----
  temporal-postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
    ports:
      - "5432:5432"
    volumes:
      - temporal-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ---- Temporal Server (auto-setup creates DB schema) ----
  temporal:
    image: temporalio/auto-setup:latest
    ports:
      - "7233:7233"
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=temporal-postgres
    depends_on:
      temporal-postgres:
        condition: service_healthy

  # ---- Temporal Web UI ----
  temporal-ui:
    image: temporalio/ui:latest
    ports:
      - "8080:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000
    depends_on:
      - temporal

  # ---- Redis ----
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ---- Express API ----
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_NAMESPACE=default
      - TEMPORAL_TASK_QUEUE=hotel-offer-queue
      - SUPPLIER_A_URL=http://app:3000/supplierA/hotels
      - SUPPLIER_B_URL=http://app:3000/supplierB/hotels
    depends_on:
      redis:
        condition: service_healthy
      temporal:
        condition: service_started
    restart: on-failure

  # ---- Temporal Worker ----
  worker:
    build: .
    environment:
      - NODE_ENV=production
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_NAMESPACE=default
      - TEMPORAL_TASK_QUEUE=hotel-offer-queue
      - SUPPLIER_A_URL=http://app:3000/supplierA/hotels
      - SUPPLIER_B_URL=http://app:3000/supplierB/hotels
    depends_on:
      app:
        condition: service_started
      temporal:
        condition: service_started
    command: ["node", "dist/temporal/worker.js"]
    restart: on-failure

volumes:
  temporal-pg-data:
  redis-data:
